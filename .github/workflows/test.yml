name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke tests (no live API — schema-only)
        run: npm test
        env:
          # Intentionally NOT set on CI: live API tests will skip cleanly.
          # Maintainers can run full suite locally with SMARTFLOW_MAPPER_API_KEY set.
          NODE_ENV: ci
